<!DOCTYPE html>
<html>
<head>
<title>SAHAJ MADAN 24BCT0099</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>
body{
font-family:Arial;
background:#eef;
text-align:center;
}
.container{
width:90%;
margin:auto;
}
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}
.card{
width:220px;
padding:10px;
border:1px solid #ccc;
background:white;
border-radius:10px;
}
img{
width:100px;
height:60px;
}
input{
padding:6px;
margin:10px;
width:200px;
}
button{
padding:6px 12px;
cursor:pointer;
}
</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const fetchCountries = async (query) => {
const res = await fetch(`https://restcountries.com/v3.1/name/${query}`);
const data = await res.json();

return data.map(c => ({
name: c.name.common,
capital: c.capital ? c.capital[0] : "N/A",
population: c.population,
region: c.region,
flag: c.flags.png
}));
};

const Header = () => {
return <h1>Country Explorer</h1>;
};

const Search = ({onSearch}) => {
const [input,setInput] = React.useState("");
return (
<div>
<input value={input} onChange={e=>setInput(e.target.value)} placeholder="Search country"/>
<button onClick={()=>onSearch(input)}>Search</button>
</div>
);
};

const CountryCard = ({country}) => {
return (
<div className="card">
<img src={country.flag}/>
<h3>{country.name}</h3>
<p>Capital: {country.capital}</p>
<p>Population: {country.population}</p>
<p>Region: {country.region}</p>
</div>
);
};

const CountryList = ({countries}) => {
return (
<div className="grid">
{
countries.map((c,i)=>(
<CountryCard key={i} country={c}/>
))
}
</div>
);
};

const App = () => {

const [countries,setCountries] = React.useState([]);

const handleSearch = async (q) => {
const data = await fetchCountries(q);
setCountries(data);
};

return (
<div className="container">
<Header/>
<Search onSearch={handleSearch}/>
<CountryList countries={countries}/>
</div>
);

};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
