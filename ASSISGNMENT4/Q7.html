<!DOCTYPE html>
<html>
<head>
<title>SAHAJ MADAN 24BCT0099</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>
body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
}
.container{
width:90%;
margin:auto;
}
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}
.card{
width:200px;
padding:10px;
border:1px solid #ccc;
background:white;
border-radius:10px;
}
img{
width:100px;
height:150px;
}
input{
padding:6px;
margin:10px;
width:200px;
}
button{
padding:6px 12px;
cursor:pointer;
}
</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const fetchBooks = async (query) => {
const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${query}`);
const data = await res.json();

return data.items.map(item => ({
title: item.volumeInfo.title,
author: item.volumeInfo.authors ? item.volumeInfo.authors[0] : "N/A",
publisher: item.volumeInfo.publisher || "N/A",
year: item.volumeInfo.publishedDate || "N/A",
image: item.volumeInfo.imageLinks ? item.volumeInfo.imageLinks.thumbnail : ""
}));
};

const Header = () => {
return <h1>Book Explorer</h1>;
};

const Search = ({onSearch}) => {
const [input,setInput] = React.useState("");
return (
<div>
<input value={input} onChange={e=>setInput(e.target.value)} placeholder="Search books"/>
<button onClick={()=>onSearch(input)}>Search</button>
</div>
);
};

const BookCard = ({book}) => {
return (
<div className="card">
<img src={book.image}/>
<h4>{book.title}</h4>
<p>{book.author}</p>
<p>{book.publisher}</p>
<p>{book.year}</p>
</div>
);
};

const BookList = ({books}) => {
return (
<div className="grid">
{
books.map((b,i)=>(
<BookCard key={i} book={b}/>
))
}
</div>
);
};

const App = () => {

const [books,setBooks] = React.useState([]);

const handleSearch = async (q) => {
const data = await fetchBooks(q);
setBooks(data);
};

return (
<div className="container">
<Header/>
<Search onSearch={handleSearch}/>
<BookList books={books}/>
</div>
);

};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
