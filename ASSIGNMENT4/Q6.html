<!DOCTYPE html>
<html>
<head>
    <title>Sahaj Madan 24BCT0099</title>
    <style>
        body { font-family: Arial; }
        table, th, td { border: 1px solid black; border-collapse: collapse; padding: 8px; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<form id="studentForm">
    Name: <input type="text" name="name"><br><br>
    Age: <input type="number" name="age"><br><br>
    Course: <input type="text" name="course"><br><br>
    <button type="button" onclick="addStudent(this.form)">Add Student</button>
    <button type="button" onclick="resetForm(this.form)">Reset</button>
</form>

<br>

<table id="studentTable">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
    </tr>
</table>

<script>
var students = [];

function Student(name, age, course) {
    this.name = name;
    this.age = age;
    this.course = course;
}

function addStudent(form) {
    var name = form.elements["name"].value;
    var age = form.elements["age"].value;
    var course = form.elements["course"].value;

    var studentObj = new Student(name, age, course);
    students.push(studentObj);

    displayStudents();

    form.reset();
    form.elements["name"].focus();
}

function displayStudents() {
    var table = document.getElementById("studentTable");
    table.innerHTML = "<tr><th>Name</th><th>Age</th><th>Course</th></tr>";

    for (var i = 0; i < students.length; i++) {
        table.innerHTML += "<tr><td>" + students[i].name + "</td><td>" + students[i].age + "</td><td>" + students[i].course + "</td></tr>";
    }
}

function resetForm(form) {
    form.reset();
    form.elements["name"].focus();
}
</script>

</body>
</html>
